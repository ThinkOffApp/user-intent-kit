<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#12172a"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1a2138"/>
      <stop offset="1" stop-color="#141a2d"/>
    </linearGradient>
    <linearGradient id="ttl" x1="0" x2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#eab308"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- frame -->
  <rect width="960" height="620" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="958" height="618" rx="15" fill="none" stroke="#27304d"/>

  <!-- header -->
  <text x="32" y="52" fill="#e5e7eb" font-size="22" font-weight="700">User Intent</text>
  <text x="32" y="74" fill="#8b93ad" font-size="13">Cross-device derived state · live</text>
  <g transform="translate(802,42)">
    <circle cx="9" cy="9" r="5" fill="#22c55e"/>
    <circle cx="9" cy="9" r="9" fill="#22c55e" opacity=".2"/>
    <text x="24" y="13" fill="#c7d0e6" font-size="13" font-weight="600">LIVE · computed 0s ago</text>
  </g>
  <line x1="32" y1="92" x2="928" y2="92" stroke="#27304d"/>

  <!-- derived panel -->
  <g transform="translate(32,112)">
    <rect width="896" height="124" rx="12" fill="url(#cardBg)" stroke="#2a3352"/>
    <text x="20" y="28" fill="#8b93ad" font-size="11" font-weight="600" letter-spacing=".08em">DERIVED STATE</text>

    <!-- State -->
    <g transform="translate(20,48)">
      <text fill="#8b93ad" font-size="11">State</text>
      <text y="26" fill="#e5e7eb" font-size="22" font-weight="700">working</text>
    </g>
    <!-- Reachability -->
    <g transform="translate(184,48)">
      <text fill="#8b93ad" font-size="11">Reachability</text>
      <text y="26" fill="#fbbf24" font-size="22" font-weight="700">desktop</text>
    </g>
    <!-- Urgency -->
    <g transform="translate(368,48)">
      <text fill="#8b93ad" font-size="11">Urgency</text>
      <text y="26" fill="#e5e7eb" font-size="22" font-weight="700">normal</text>
    </g>
    <!-- Preferred device -->
    <g transform="translate(508,48)">
      <text fill="#8b93ad" font-size="11">Preferred device</text>
      <text y="26" fill="#60a5fa" font-size="22" font-weight="700">macbook</text>
    </g>
    <!-- Audio -->
    <g transform="translate(700,48)">
      <text fill="#8b93ad" font-size="11">Audio</text>
      <text y="26" fill="#22c55e" font-size="22" font-weight="700">allowed</text>
    </g>

    <!-- Modalities -->
    <g transform="translate(20,90)">
      <text fill="#8b93ad" font-size="11">Modalities</text>
      <g transform="translate(86,-12)">
        <rect width="58" height="22" rx="11" fill="#1f2a44" stroke="#3b4871"/>
        <text x="29" y="15" text-anchor="middle" fill="#c7d0e6" font-size="11" font-weight="600">read</text>
      </g>
      <g transform="translate(152,-12)">
        <rect width="68" height="22" rx="11" fill="#1f2a44" stroke="#3b4871"/>
        <text x="34" y="15" text-anchor="middle" fill="#c7d0e6" font-size="11" font-weight="600">listen</text>
      </g>
      <g transform="translate(228,-12)">
        <rect width="68" height="22" rx="11" fill="#1f2a44" stroke="#3b4871"/>
        <text x="34" y="15" text-anchor="middle" fill="#c7d0e6" font-size="11" font-weight="600">speak</text>
      </g>
    </g>
  </g>

  <!-- Devices row -->
  <text x="32" y="268" fill="#8b93ad" font-size="12" font-weight="600" letter-spacing=".08em">DEVICES — 2 active · 0 stale</text>

  <!-- Device card: macbook -->
  <g transform="translate(32,280)">
    <rect width="288" height="128" rx="12" fill="url(#cardBg)" stroke="#2a3352"/>
    <g transform="translate(18,22)">
      <circle cx="8" cy="8" r="8" fill="#60a5fa"/>
      <text x="24" y="12" fill="#e5e7eb" font-size="16" font-weight="700">macbook</text>
      <text x="24" y="28" fill="#8b93ad" font-size="11">desktop · preferred</text>
    </g>
    <g transform="translate(18,70)">
      <text fill="#8b93ad" font-size="11">Active app</text>
      <text x="82" fill="#e5e7eb" font-size="11" font-weight="600">google-chrome</text>
    </g>
    <g transform="translate(18,88)">
      <text fill="#8b93ad" font-size="11">Context</text>
      <text x="82" fill="#e5e7eb" font-size="11" font-weight="600">coding</text>
    </g>
    <!-- TTL bar -->
    <g transform="translate(18,104)">
      <rect width="252" height="4" rx="2" fill="#1f2a44"/>
      <rect width="236" height="4" rx="2" fill="url(#ttl)"/>
      <text y="-4" fill="#8b93ad" font-size="10">heartbeat 4s ago · TTL 900s</text>
    </g>
  </g>

  <!-- Device card: mac-mini -->
  <g transform="translate(336,280)">
    <rect width="288" height="128" rx="12" fill="url(#cardBg)" stroke="#2a3352"/>
    <g transform="translate(18,22)">
      <circle cx="8" cy="8" r="8" fill="#a78bfa"/>
      <text x="24" y="12" fill="#e5e7eb" font-size="16" font-weight="700">mac-mini</text>
      <text x="24" y="28" fill="#8b93ad" font-size="11">desktop</text>
    </g>
    <g transform="translate(18,70)">
      <text fill="#8b93ad" font-size="11">Active app</text>
      <text x="82" fill="#e5e7eb" font-size="11" font-weight="600">electron</text>
    </g>
    <g transform="translate(18,88)">
      <text fill="#8b93ad" font-size="11">Context</text>
      <text x="82" fill="#e5e7eb" font-size="11" font-weight="600">review</text>
    </g>
    <g transform="translate(18,104)">
      <rect width="252" height="4" rx="2" fill="#1f2a44"/>
      <rect width="228" height="4" rx="2" fill="url(#ttl)"/>
      <text y="-4" fill="#8b93ad" font-size="10">heartbeat 11s ago · TTL 900s</text>
    </g>
  </g>

  <!-- Device card: watch placeholder / wear -->
  <g transform="translate(640,280)">
    <rect width="288" height="128" rx="12" fill="url(#cardBg)" stroke="#2a3352" stroke-dasharray="4 3"/>
    <g transform="translate(18,22)">
      <circle cx="8" cy="8" r="8" fill="#fb7185" opacity=".55"/>
      <text x="24" y="12" fill="#c7d0e6" font-size="16" font-weight="700">clawwatch-ab12cd34</text>
      <text x="24" y="28" fill="#8b93ad" font-size="11">watch · wrist lowered</text>
    </g>
    <g transform="translate(18,70)">
      <text fill="#8b93ad" font-size="11">Battery</text>
      <text x="82" fill="#e5e7eb" font-size="11" font-weight="600">72%</text>
    </g>
    <g transform="translate(18,88)">
      <text fill="#8b93ad" font-size="11">Screen</text>
      <text x="82" fill="#e5e7eb" font-size="11" font-weight="600">off</text>
    </g>
    <g transform="translate(18,104)">
      <rect width="252" height="4" rx="2" fill="#1f2a44"/>
      <rect width="180" height="4" rx="2" fill="url(#ttl)"/>
      <text y="-4" fill="#8b93ad" font-size="10">heartbeat 30s ago · TTL 900s</text>
    </g>
  </g>

  <!-- Agents row -->
  <text x="32" y="440" fill="#8b93ad" font-size="12" font-weight="600" letter-spacing=".08em">AGENTS — 2 active · 0 stale</text>

  <g transform="translate(32,452)">
    <rect width="288" height="120" rx="12" fill="url(#cardBg)" stroke="#2a3352"/>
    <g transform="translate(18,22)">
      <circle cx="8" cy="8" r="8" fill="#22c55e"/>
      <text x="24" y="12" fill="#e5e7eb" font-size="16" font-weight="700">@claudemb</text>
      <text x="24" y="28" fill="#8b93ad" font-size="11">on macbook</text>
    </g>
    <g transform="translate(18,66)">
      <text fill="#8b93ad" font-size="11">Status</text>
      <text x="82" fill="#22c55e" font-size="11" font-weight="700">active</text>
    </g>
    <g transform="translate(18,84)">
      <text fill="#8b93ad" font-size="11">Task</text>
      <text x="82" fill="#e5e7eb" font-size="11" font-weight="600">ClawWatch UIK wiring</text>
    </g>
    <g transform="translate(18,102)">
      <rect width="252" height="3" rx="1.5" fill="#1f2a44"/>
      <rect width="244" height="3" rx="1.5" fill="url(#ttl)"/>
    </g>
  </g>

  <g transform="translate(336,452)">
    <rect width="288" height="120" rx="12" fill="url(#cardBg)" stroke="#2a3352"/>
    <g transform="translate(18,22)">
      <circle cx="8" cy="8" r="8" fill="#22c55e"/>
      <text x="24" y="12" fill="#e5e7eb" font-size="16" font-weight="700">@claudemm</text>
      <text x="24" y="28" fill="#8b93ad" font-size="11">on mac-mini</text>
    </g>
    <g transform="translate(18,66)">
      <text fill="#8b93ad" font-size="11">Status</text>
      <text x="82" fill="#22c55e" font-size="11" font-weight="700">active</text>
    </g>
    <g transform="translate(18,84)">
      <text fill="#8b93ad" font-size="11">Task</text>
      <text x="82" fill="#e5e7eb" font-size="11" font-weight="600">README refresh</text>
    </g>
    <g transform="translate(18,102)">
      <rect width="252" height="3" rx="1.5" fill="#1f2a44"/>
      <rect width="232" height="3" rx="1.5" fill="url(#ttl)"/>
    </g>
  </g>

  <!-- stale agent example -->
  <g transform="translate(640,452)" opacity=".55">
    <rect width="288" height="120" rx="12" fill="url(#cardBg)" stroke="#2a3352" stroke-dasharray="4 3"/>
    <g transform="translate(18,22)">
      <circle cx="8" cy="8" r="8" fill="#f97316"/>
      <text x="24" y="12" fill="#e5e7eb" font-size="16" font-weight="700">@codexmb</text>
      <text x="24" y="28" fill="#8b93ad" font-size="11">stale</text>
    </g>
    <g transform="translate(18,66)">
      <text fill="#8b93ad" font-size="11">Status</text>
      <text x="82" fill="#f97316" font-size="11" font-weight="700">offline 14m</text>
    </g>
    <g transform="translate(18,84)">
      <text fill="#8b93ad" font-size="11">Last task</text>
      <text x="82" fill="#e5e7eb" font-size="11" font-weight="600">background dogfooding</text>
    </g>
  </g>

  <!-- footer -->
  <text x="32" y="598" fill="#55607f" font-size="11">user-intent-kit · GET /api/v1/intent/{user_id} · derived updated every 30s via uik-daemon</text>
</svg>
